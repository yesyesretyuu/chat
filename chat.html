<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simple Chat Room</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f2f2f2;margin:0;display:flex;flex-direction:column;height:100vh}
#chat{flex:1;overflow-y:auto;padding:15px}
.message{margin-bottom:10px}
.name{font-weight:bold}
#inputArea{display:flex;border-top:1px solid #ccc;background:#fff}
#msg{flex:1;padding:10px;border:none;font-size:16px}
#send{padding:10px 16px;border:none;background:#4CAF50;color:white;font-size:16px;cursor:pointer}
#send:hover{background:#45a049}
</style>
</head>
<body>
<div id="chat"></div>
<div id="inputArea">
<input id="msg" placeholder="Type a message..." />
<button id="send">Send</button>
</div>

<script>
const chat=document.getElementById('chat');
const msgInput=document.getElementById('msg');
const sendBtn=document.getElementById('send');

let nickname=localStorage.getItem('chatNickname');

if(!nickname){
 nickname=prompt('Choose your nickname (you can only set this once):');
 if(!nickname||nickname.trim()===''){nickname='User'+Math.floor(Math.random()*1000)}
 localStorage.setItem('chatNickname',nickname);
}

const banned=["fuck","shit","bitch","asshole","bastard","dick","cunt"];

function containsSwear(text){
 const lower=text.toLowerCase();
 return banned.some(word=>lower.includes(word));
}

const channel=new BroadcastChannel('simple-chat');

channel.onmessage=(e)=>{
 addMessage(e.data.name,e.data.text);
};

function addMessage(name,text){
 const div=document.createElement('div');
 div.className='message';
 div.innerHTML='<span class="name">'+name+':</span> '+text;
 chat.appendChild(div);
 chat.scrollTop=chat.scrollHeight;
}

function send(){
 const text=msgInput.value.trim();
 if(!text) return;
 if(containsSwear(text)){
  alert('Swearing is not allowed in this chat.');
  return;
 }
 const msg={name:nickname,text:text};
 channel.postMessage(msg);
 addMessage(msg.name,msg.text);
 msgInput.value='';
}

sendBtn.onclick=send;
msgInput.addEventListener('keypress',e=>{if(e.key==='Enter')send();});
</script>
</body>
</html>
